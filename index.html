<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RBobloxian5542 — Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:       #0a0a0a;
      --text:     #f0ead8;
      --text-dim: #888888;
      --grid:     rgba(255, 255, 255, 0.04);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; min-height: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      overflow-x: hidden;
    }

    /* ── HERO ── */
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 2rem 5vw 1.5rem;
    }

    /* top bar */
    .hero-topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 3vh;
    }

    .hero-name {
      font-size: 0.9rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text);
    }

    .hero-label {
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    /* content row */
    .hero-content {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      flex: 1;
      gap: 2vw;
      padding-top: 1vh;
    }

    /* left */
    .hero-left {
      flex: 1;
      max-width: 520px;
    }

    .hero-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(4rem, 8.5vw, 8.5rem);
      line-height: 0.9;
      color: var(--text);
      margin-bottom: 1.5rem;
      letter-spacing: 0.01em;
    }

    .hero-desc {
      font-size: 0.78rem;
      line-height: 1.8;
      color: var(--text-dim);
      max-width: 400px;
      margin-bottom: 2rem;
    }

    /* socials — horizontal row */
    .hero-socials {
      display: flex;
      flex-direction: row;
      gap: 1.8rem;
      align-items: center;
    }

    .social-link {
      display: inline-flex;
      align-items: center;
      gap: 0.55rem;
      text-decoration: none;
      color: var(--text);
      font-size: 0.8rem;
      letter-spacing: 0.04em;
      transition: opacity 0.2s;
    }

    .social-link:hover { opacity: 0.55; }

    .social-link.no-link {
      cursor: default;
      opacity: 0.5;
    }

    .social-icon {
      width: 22px;
      height: 22px;
      object-fit: contain;
    }

    /* right — avatar with grid bg */
    .hero-right {
      flex: 0 0 auto;
      position: relative;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      width: 420px;
      height: 520px;
    }

    /* geometric grid background */
    .hero-right::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(var(--grid) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid) 1px, transparent 1px);
      background-size: 40px 40px;
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 2px;
      z-index: 0;
    }

    /* fade grid at edges */
    .hero-right::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 40%, var(--bg) 100%);
      z-index: 1;
      pointer-events: none;
    }

    .avatar {
      height: 500px;
      width: auto;
      object-fit: contain;
      display: block;
      position: relative;
      z-index: 2;
    }

    /* scroll arrow */
    .hero-scroll {
      text-align: center;
      font-size: 1.2rem;
      color: var(--text-dim);
      padding: 1rem 0 0.5rem;
      animation: bounce 2s ease-in-out infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(6px); }
    }

    /* responsive */
    @media (max-width: 768px) {
      .hero-content {
        flex-direction: column-reverse;
        align-items: center;
        gap: 2rem;
      }
      .hero-right {
        width: 280px;
        height: 340px;
      }
      .avatar { height: 320px; }
      .hero-socials { flex-wrap: wrap; gap: 1.2rem; }
    }
  </style>
</head>
<body>

  <header class="hero">

    <div class="hero-topbar">
      <span class="hero-name">RBobloxian5542</span>
      <span class="hero-label">Portfolio</span>
    </div>

    <div class="hero-content">

      <div class="hero-left">
        <h1 class="hero-title">
          Roblox<br>
          Scripter
        </h1>
        <p class="hero-desc">
          I'm a Roblox scripter with over a year of experience,
          focused on building trendy, polished games.
        </p>
        <div class="hero-socials">

          <a href="https://www.roblox.com/users/7539349290/profile" target="_blank" class="social-link">
            <img src="Images/Roblox.png" alt="Roblox" class="social-icon">
            <span>RBobloxian5542</span>
          </a>

          <a href="https://x.com/RBobloxian5542" target="_blank" class="social-link">
            <img src="Images/X.png" alt="X" class="social-icon">
            <span>RBobloxian5542</span>
          </a>

          <div class="social-link no-link">
            <img src="Images/Discord.png" alt="Discord" class="social-icon">
            <span>RBobloxian5542</span>
          </div>

        </div>
      </div>

      <div class="hero-right">
        <img src="Images/RobloxAvatar.png" alt="Roblox Avatar" class="avatar">
      </div>

    </div>

    <div class="hero-scroll">&#8595;</div>

  </header>

</body>
</html>
