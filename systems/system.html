<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>System — RBobloxian5542</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:       #0d0d0f;
      --bg2:      #131316;
      --bg3:      #1a1a1e;
      --text:     #f0ead8;
      --text-dim: #777;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; min-height: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      overflow-x: hidden;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.4rem 5vw;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      background: var(--bg2);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      text-decoration: none;
      color: var(--text-dim);
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: color 0.2s;
    }
    .back-btn:hover { color: var(--text); }

    .topbar-title {
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .hero {
      display: flex;
      gap: 2rem;
      padding: 3rem 5vw 2.5rem;
      align-items: flex-start;
    }

    .thumb-wrap {
      flex: 0 0 auto;
      width: 45%;
      max-width: 540px;
      border-radius: 4px;
      overflow: hidden;
      background: var(--bg3);
      aspect-ratio: 16/9;
    }

    .thumb-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .thumb-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.15);
    }

    .item-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      align-self: stretch;
    }

    .item-info-top {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .repo-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      background: transparent;
      color: var(--text);
      text-decoration: none;
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.75rem 1.8rem;
      border-radius: 3px;
      width: fit-content;
      border: 1px solid rgba(255,255,255,0.2);
      transition: border-color 0.2s, color 0.2s;
      margin-top: auto;
    }

    .repo-btn:hover { border-color: var(--text); }

    .repo-btn svg {
      width: 14px;
      height: 14px;
      fill: var(--text);
      flex-shrink: 0;
    }

    .item-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2rem, 4vw, 3.5rem);
      line-height: 1;
      letter-spacing: 0.02em;
    }

    .item-broad {
      font-size: 0.8rem;
      color: var(--text-dim);
      letter-spacing: 0.05em;
      line-height: 1.6;
    }

    .divider {
      height: 1px;
      background: rgba(255,255,255,0.06);
      margin: 0 5vw;
    }

    .content {
      padding: 2.5rem 5vw 5rem;
      display: flex;
      flex-direction: column;
      gap: 3rem;
    }

    .section-label {
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 1.2rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.06);
    }

    .description-text {
      font-size: 0.82rem;
      line-height: 1.9;
      color: var(--text-dim);
      max-width: 680px;
      background: var(--bg2);
      padding: 1.5rem;
      border-radius: 2px;
      border: 1px solid rgba(255,255,255,0.05);
    }

    .screenshots-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 0.8rem;
    }

    .screenshot-img {
      width: 100%;
      aspect-ratio: 16/9;
      object-fit: cover;
      display: block;
      border-radius: 2px;
      cursor: pointer;
    }
    .screenshot-img:hover { opacity: 0.85; }

    .videos-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 0.8rem;
    }

    .yt-facade {
      position: relative;
      width: 100%;
      aspect-ratio: 16/9;
      border-radius: 2px;
      overflow: hidden;
      cursor: pointer;
      background: #000;
    }
    .yt-facade img { width: 100%; height: 100%; object-fit: cover; display: block; transition: opacity 0.2s; }
    .yt-facade:hover img { opacity: 0.75; }
    .yt-play { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; }
    .yt-play svg { width: 68px; height: 48px; filter: drop-shadow(0 2px 8px rgba(0,0,0,0.5)); transition: transform 0.2s; }
    .yt-facade:hover .yt-play svg { transform: scale(1.1); }

    .video-modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.88);
      backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }
    .video-modal.active { opacity: 1; pointer-events: all; }
    .video-modal-inner {
      width: 85vw;
      max-width: 1100px;
      aspect-ratio: 16/9;
      position: relative;
      transform: scale(0.9);
      transition: transform 0.3s cubic-bezier(0.34, 1.2, 0.64, 1);
    }
    .video-modal.active .video-modal-inner { transform: scale(1); }
    .video-modal-inner iframe { width: 100%; height: 100%; border: none; border-radius: 3px; display: block; }
    .video-modal-close {
      position: absolute;
      top: -2.5rem;
      right: 0;
      color: rgba(255,255,255,0.6);
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      transition: color 0.2s;
      background: none;
      border: none;
      font-family: 'DM Mono', monospace;
    }
    .video-modal-close:hover { color: #fff; }

    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 998;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }
    .lightbox.active { opacity: 1; pointer-events: all; }
    .lightbox img {
      max-width: 87vw;
      max-height: 87vh;
      width: auto;
      height: auto;
      min-width: min(800px, 82vw);
      object-fit: contain;
      border-radius: 3px;
      transform: scale(0.8);
      transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
      display: block;
    }
    .lightbox.active img { transform: scale(1); }

    @media (max-width: 768px) {
      .hero { flex-direction: column; }
      .thumb-wrap { width: 100%; max-width: 100%; }
    }
  </style>
</head>
<body>

  <nav class="topbar">
    <a href="https://rbobloxian5542.github.io/systems" class="back-btn">← Game Systems</a>
    <span class="topbar-title" id="topbar-name">Loading...</span>
  </nav>

  <div class="hero">
    <div class="thumb-wrap" id="thumb-wrap">
      <div class="thumb-placeholder">Loading...</div>
    </div>
    <div class="item-info">
      <div class="item-info-top">
        <div class="item-title" id="item-title">Loading...</div>
        <div class="item-broad" id="item-broad"></div>
      </div>
      <a href="#" id="repo-btn" target="_blank" class="repo-btn" style="display:none;">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.477 2 2 6.477 2 12c0 4.418 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.009-.868-.013-1.703-2.782.604-3.369-1.341-3.369-1.341-.454-1.155-1.11-1.463-1.11-1.463-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.564 9.564 0 0112 6.844a9.59 9.59 0 012.504.337c1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.203 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.741 0 .267.18.578.688.48C19.138 20.163 22 16.418 22 12c0-5.523-4.477-10-10-10z"/></svg>
        View Repo
      </a>
    </div>
  </div>

  <div class="divider"></div>

  <div class="content">

    <div>
      <div class="section-label">Description</div>
      <p class="description-text" id="item-description">No description yet.</p>
    </div>

    <div id="screenshots-section">
      <div class="section-label">Screenshots</div>
      <div class="screenshots-grid" id="screenshots-grid"></div>
    </div>

    <div id="videos-section">
      <div class="section-label">Video Showcase</div>
      <div class="videos-grid" id="videos-grid"></div>
    </div>

  </div>

  <div class="video-modal" id="video-modal" onclick="closeVideoModal()">
    <div class="video-modal-inner" onclick="event.stopPropagation()">
      <button class="video-modal-close" onclick="closeVideoModal()">✕ Close</button>
      <iframe id="video-modal-iframe" src="" allowfullscreen allow="autoplay"></iframe>
    </div>
  </div>

  <div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <img id="lightbox-img" src="" alt="Screenshot" onclick="event.stopPropagation()">
  </div>

  <script>
    function openVideoModal(src) {
      document.getElementById('video-modal-iframe').src = src;
      document.getElementById('video-modal').classList.add('active');
      document.body.style.overflow = 'hidden';
    }
    function closeVideoModal() {
      document.getElementById('video-modal-iframe').src = '';
      document.getElementById('video-modal').classList.remove('active');
      document.body.style.overflow = '';
    }
    function openLightbox(src) {
      document.getElementById('lightbox-img').src = src;
      document.getElementById('lightbox').classList.add('active');
      document.body.style.overflow = 'hidden';
    }
    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('active');
      document.body.style.overflow = '';
    }
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') { closeLightbox(); closeVideoModal(); }
    });

    const params = new URLSearchParams(window.location.search);
    const slug   = params.get('system');

    if (!slug) {
      document.getElementById('item-title').textContent = 'System not found';
    } else {
      fetch('../systems.json')
        .then(r => r.json())
        .then(items => {
          const item = items.find(i => i.slug === slug);
          if (!item) { document.getElementById('item-title').textContent = 'System not found'; return; }

          document.title = item.title + ' — RBobloxian5542';
          document.getElementById('topbar-name').textContent = item.title;

          const wrap = document.getElementById('thumb-wrap');
          wrap.innerHTML = item.thumb
            ? `<img src="../${item.thumb}" alt="${item.title}">`
            : `<div class="thumb-placeholder">No Thumbnail</div>`;

          document.getElementById('item-title').textContent = item.title;
          document.getElementById('item-broad').textContent = item.broadDescription || '';

          // Repo button
          if (item.repo) {
            const btn = document.getElementById('repo-btn');
            btn.href = item.repo;
            btn.style.display = 'inline-flex';
          }

          if (item.description) {
            const desc = document.getElementById('item-description');
            desc.style.whiteSpace = 'pre-line';
            desc.textContent = item.description;
          }

          // Screenshots
          const screenshotsGrid = document.getElementById('screenshots-grid');
          if (item.screenshots && item.screenshots.length > 0) {
            screenshotsGrid.innerHTML = item.screenshots.map((src, i) =>
              `<img class="screenshot-img" src="../${src}" alt="Screenshot ${i + 1}" onclick="openLightbox(this.src)">`
            ).join('');
          } else {
            document.getElementById('screenshots-section').style.display = 'none';
          }

          // Videos
          const videosGrid = document.getElementById('videos-grid');
          if (item.videos && item.videos.length > 0) {
            videosGrid.innerHTML = item.videos.map(url => {
              if (url.endsWith('.mp4') || url.endsWith('.webm')) {
                return `<video controls style="width:100%;aspect-ratio:16/9;border-radius:2px;display:block;background:#000;"><source src="../${url}" type="video/mp4"></video>`;
              }
              let ytId = null;
              if (url.includes('youtube.com/watch')) ytId = new URL(url).searchParams.get('v');
              else if (url.includes('youtu.be/')) ytId = url.split('youtu.be/')[1].split('?')[0];
              if (ytId) {
                const thumb = `https://img.youtube.com/vi/${ytId}/maxresdefault.jpg`;
                const embedUrl = `https://www.youtube.com/embed/${ytId}?autoplay=1&modestbranding=1&rel=0&iv_load_policy=3`;
                return `
                  <div class="yt-facade" onclick="openVideoModal('${embedUrl}')">
                    <img src="${thumb}" alt="Video">
                    <div class="yt-play">
                      <svg viewBox="0 0 68 48"><path d="M66.5 7.7c-.8-2.9-3-5.2-5.9-6C55.8.1 34 0 34 0S12.2.1 7.4 1.7C4.5 2.5 2.3 4.8 1.5 7.7 0 12.5 0 24 0 24s0 11.5 1.5 16.3c.8 2.9 3 5.2 5.9 6C12.2 47.9 34 48 34 48s21.8-.1 26.6-1.7c2.9-.8 5.1-3.1 5.9-6C68 35.5 68 24 68 24s0-11.5-1.5-16.3z" fill="#ff0000"/><path d="M45 24 27 14v20" fill="#fff"/></svg>
                    </div>
                  </div>`;
              }
              let embedUrl = url;
              if (url.includes('streamable.com') && !url.includes('/e/')) embedUrl = url.replace('streamable.com/', 'streamable.com/e/');
              return `<iframe src="${embedUrl}" frameborder="0" allowfullscreen style="width:100%;aspect-ratio:16/9;border-radius:2px;display:block;"></iframe>`;
            }).join('');
          } else {
            document.getElementById('videos-section').style.display = 'none';
          }
        })
        .catch(() => {
          document.getElementById('item-title').textContent = 'Could not load data';
        });
    }
  </script>

</body>
</html>
