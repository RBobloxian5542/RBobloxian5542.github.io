<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game — RBobloxian5542</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:          #0d0d0f;
      --bg2:         #131316;
      --bg3:         #1a1a1e;
      --text:        #f0ead8;
      --text-dim:    #777;
      --tag-lead:    #ff6eb4;
      --tag-commission: #60a5fa;
      --tag-part:    #a78bfa;
      --roblox-blue: #0066ff;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; min-height: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      overflow-x: hidden;
    }

    /* ── TOP BAR ── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.4rem 5vw;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      background: var(--bg2);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      text-decoration: none;
      color: var(--text-dim);
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: color 0.2s;
    }
    .back-btn:hover { color: var(--text); }

    .topbar-title {
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    /* ── HERO SECTION ── */
    .game-hero {
      display: flex;
      gap: 2rem;
      padding: 3rem 5vw 2.5rem;
      align-items: flex-start;
    }

    /* thumbnail */
    .game-thumb-wrap {
      flex: 0 0 auto;
      width: 45%;
      max-width: 540px;
      border-radius: 4px;
      overflow: hidden;
      background: var(--bg3);
      aspect-ratio: 16/9;
    }

    .game-thumb-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .game-thumb-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.15);
    }

    /* right side info — same height as thumbnail, play btn at bottom */
    .game-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      align-self: stretch;
    }

    .game-info-top {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      flex: 1;
    }

    .game-tag {
      display: inline-block;
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 0.25rem 0.65rem;
      border: 1px solid;
      border-radius: 1px;
      width: fit-content;
    }

    .game-tag.Lead         { color: var(--tag-lead);    border-color: var(--tag-lead);    background: rgba(255,110,180,0.07); }
    .game-tag.Commission { color: var(--tag-commission); border-color: var(--tag-commission); background: rgba(96,165,250,0.07); }
    .game-tag.Part-Time    { color: var(--tag-part);    border-color: var(--tag-part);    background: rgba(167,139,250,0.07); }

    .game-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2rem, 4vw, 3.5rem);
      line-height: 1;
      letter-spacing: 0.02em;
    }

    .game-visits {
      font-size: 0.72rem;
      color: var(--text-dim);
      letter-spacing: 0.08em;
    }

    .game-visits b { color: var(--text); font-weight: 400; }

    /* Roblox play button — sits at bottom of info col */
    .play-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      background: var(--roblox-blue);
      color: #fff;
      text-decoration: none;
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.75rem 1.8rem;
      border-radius: 3px;
      width: fit-content;
      transition: background 0.2s;
      margin-top: auto;
    }

    .play-btn:hover { background: #0052cc; }

    .play-btn.private {
      background: #2a2a2a;
      color: var(--text-dim);
      cursor: default;
      pointer-events: none;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .play-btn svg {
      width: 14px;
      height: 14px;
      fill: #fff;
      flex-shrink: 0;
    }

    /* ── DIVIDER ── */
    .divider {
      height: 1px;
      background: rgba(255,255,255,0.06);
      margin: 0 5vw;
    }

    /* ── CONTENT SECTIONS ── */
    .content {
      padding: 2.5rem 5vw 5rem;
      display: flex;
      flex-direction: column;
      gap: 3rem;
    }

    .section-label {
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 1.2rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.06);
    }

    /* description */
    .description-text {
      font-size: 0.82rem;
      line-height: 1.9;
      color: var(--text-dim);
      max-width: 680px;
      background: var(--bg2);
      padding: 1.5rem;
      border-radius: 2px;
      border: 1px solid rgba(255,255,255,0.05);
      overflow: hidden;
      max-height: 7rem;
      transition: max-height 0.4s ease;
      position: relative;
      -webkit-mask-image: linear-gradient(to bottom, black 50%, transparent 100%);
      mask-image: linear-gradient(to bottom, black 50%, transparent 100%);
    }

    .description-text.expanded {
      max-height: 2000px;
      -webkit-mask-image: none;
      mask-image: none;
    }

    .show-more-btn {
      background: none;
      border: none;
      color: var(--text-dim);
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      padding: 0.5rem 0;
      transition: color 0.2s;
      display: block;
      margin-top: 0.5rem;
    }

    .show-more-btn:hover { color: var(--text); }

    /* screenshots grid */
    .screenshots-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 0.8rem;
    }

    .screenshot-placeholder {
      aspect-ratio: 16/9;
      background: var(--bg3);
      border: 1px dashed rgba(255,255,255,0.08);
      border-radius: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.15);
    }

    /* screenshot real image */
    .screenshot-img {
      width: 100%;
      aspect-ratio: 16/9;
      object-fit: cover;
      display: block;
      border-radius: 2px;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .screenshot-img:hover { opacity: 0.85; }
    .videos-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 0.8rem;
    }

    .video-placeholder {
      aspect-ratio: 16/9;
      background: var(--bg3);
      border: 1px dashed rgba(255,255,255,0.08);
      border-radius: 2px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.15);
    }

    .video-placeholder svg {
      width: 28px;
      height: 28px;
      fill: rgba(255,255,255,0.1);
    }

    /* ── YOUTUBE FACADE ── */
    .yt-facade {
      position: relative;
      width: 100%;
      aspect-ratio: 16/9;
      border-radius: 2px;
      overflow: hidden;
      cursor: pointer;
      background: #000;
    }

    .yt-facade img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: opacity 0.2s;
    }

    .yt-facade:hover img { opacity: 0.75; }

    .yt-play {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .yt-play svg {
      width: 68px;
      height: 48px;
      filter: drop-shadow(0 2px 8px rgba(0,0,0,0.5));
      transition: transform 0.2s;
    }

    .yt-facade:hover .yt-play svg { transform: scale(1.1); }

    /* ── VIDEO MODAL ── */
    .video-modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.88);
      backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }

    .video-modal.active {
      opacity: 1;
      pointer-events: all;
    }

    .video-modal-inner {
      width: 85vw;
      max-width: 1100px;
      aspect-ratio: 16/9;
      position: relative;
      transform: scale(0.9);
      transition: transform 0.3s cubic-bezier(0.34, 1.2, 0.64, 1);
    }

    .video-modal.active .video-modal-inner { transform: scale(1); }

    .video-modal-inner iframe {
      width: 100%;
      height: 100%;
      border: none;
      border-radius: 3px;
      display: block;
    }

    .video-modal-close {
      position: absolute;
      top: -2.5rem;
      right: 0;
      color: rgba(255,255,255,0.6);
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      transition: color 0.2s;
      background: none;
      border: none;
      font-family: 'DM Mono', monospace;
    }

    .video-modal-close:hover { color: #fff; }

    /* ── LIGHTBOX ── */
    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
      backdrop-filter: blur(4px);
    }

    .lightbox.active {
      opacity: 1;
      pointer-events: all;
    }

    .lightbox img {
      max-width: 87vw;
      max-height: 87vh;
      width: auto;
      height: auto;
      min-width: min(800px, 82vw);
      object-fit: contain;
      border-radius: 3px;
      transform: scale(0.8);
      transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
      display: block;
    }

    .lightbox.active img {
      transform: scale(1);
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      .game-hero {
        flex-direction: column;
      }
      .game-thumb-wrap {
        width: 100%;
        max-width: 100%;
      }
    }
  </style>
</head>
<body>

  <nav class="topbar">
    <a href="https://rbobloxian5542.github.io/games" class="back-btn">← Games</a>
    <span class="topbar-title" id="topbar-name">Loading...</span>
  </nav>

  <!-- Hero -->
  <div class="game-hero">
    <div class="game-thumb-wrap" id="thumb-wrap">
      <div class="game-thumb-placeholder">Loading...</div>
    </div>
    <div class="game-info">
      <div class="game-info-top">
        <div class="game-title" id="game-title">Loading...</div>
        <span class="game-tag" id="game-tag">—</span>
        <div class="game-visits">Visits: <b id="game-visits">—</b></div>
      </div>
      <a href="#" id="play-btn" target="_blank" class="play-btn">
        <svg viewBox="0 0 16 16"><path d="M3 2l11 6-11 6V2z"/></svg>
        Play on Roblox
      </a>
    </div>
  </div>

  <div class="divider"></div>

  <!-- Content -->
  <div class="content">

    <!-- Description -->
    <div>
      <div class="section-label">Work Done</div>
      <p class="description-text" id="game-description">No description yet.</p>
      <button class="show-more-btn" id="show-more-btn" onclick="toggleDesc()">Show More ↓</button>
    </div>

    <!-- Screenshots -->
    <div id="screenshots-section">
      <div class="section-label">Screenshots</div>
      <div class="screenshots-grid" id="screenshots-grid">
        <div class="screenshot-placeholder">Screenshot 1</div>
        <div class="screenshot-placeholder">Screenshot 2</div>
        <div class="screenshot-placeholder">Screenshot 3</div>
      </div>
    </div>

    <!-- Videos -->
    <div id="videos-section">
      <div class="section-label">Video Showcase</div>
      <div class="videos-grid" id="videos-grid">
        <div class="video-placeholder">
          <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
          Video Coming Soon
        </div>
      </div>
    </div>

  </div>

  <script>
    const tagClass = { 'Lead Developer': 'Lead', 'Part Time': 'Part-Time', 'Commission': 'Commission' };

    function formatVisits(n) {
      n = parseInt(n);
      if (isNaN(n)) return '—';
      if (n >= 1000000000) return (n / 1000000000).toFixed(1).replace(/\.0$/, '') + 'B';
      if (n >= 1000000)    return (n / 1000000).toFixed(1).replace(/\.0$/, '')    + 'M';
      if (n >= 1000)       return (n / 1000).toFixed(1).replace(/\.0$/, '')       + 'K';
      return n.toString();
    }

    // Get slug from URL
    const params = new URLSearchParams(window.location.search);
    const slug   = params.get('game');

    if (!slug) {
      document.getElementById('game-title').textContent = 'Game not found';
    } else {
      fetch('../games.json')
        .then(r => r.json())
        .then(games => {
          const game = games.find(g => g.slug === slug);
          if (!game) { document.getElementById('game-title').textContent = 'Game not found'; return; }

          // Topbar
          document.title = game.title + ' — RBobloxian5542';
          document.getElementById('topbar-name').textContent = game.title;

          // Thumbnail
          const wrap = document.getElementById('thumb-wrap');
          wrap.innerHTML = game.thumb
            ? `<img src="${game.thumb}" alt="${game.title}">`
            : `<div class="game-thumb-placeholder">No Thumbnail</div>`;

          // Tag
          const tagEl  = document.getElementById('game-tag');
          const tagCls = tagClass[game.tag] || 'Commission';
          tagEl.textContent = game.tag;
          tagEl.classList.add(tagCls);

          // Title, visits, link
          document.getElementById('game-title').textContent  = game.title;
          document.getElementById('game-visits').textContent = formatVisits(game.visits);

          const playBtn = document.getElementById('play-btn');
          if (game.private) {
            playBtn.classList.add('private');
            playBtn.removeAttribute('href');
            playBtn.querySelector('span') && (playBtn.querySelector('span').textContent = 'In Development');
            playBtn.innerHTML = `<svg viewBox="0 0 16 16"><path d="M8 1a7 7 0 100 14A7 7 0 008 1zM7 5h2v5H7V5zm0 6h2v2H7v-2z" fill="currentColor"/></svg> In Development`;
          } else {
            playBtn.href = game.link || '#';
          }

          // Description
          if (game.description) {
            const desc = document.getElementById('game-description');
            desc.style.whiteSpace = 'pre-line';
            desc.textContent = game.description;
            // Hide button if content fits without scrolling
            requestAnimationFrame(() => {
              if (desc.scrollHeight <= desc.clientHeight + 5) {
                document.getElementById('show-more-btn').style.display = 'none';
              }
            });
          } else {
            document.getElementById('show-more-btn').style.display = 'none';
          }

          // Screenshots — auto load 1.png, 2.png... from Images/Showcases/ImageFolder/
          const screenshotsGrid = document.getElementById('screenshots-grid');
          const folderName = game.imageFolder || game.title.replace(/\s+/g, '');
          const extensions = ['png', 'jpg', 'jpeg'];

          async function loadScreenshots() {
            const imgs = [];
            let i = 1;
            while (i <= 20) {
              let found = false;
              for (const ext of extensions) {
                const src = `../Images/Showcases/${folderName}/${i}.${ext}`;
                const ok = await new Promise(res => {
                  const img = new Image();
                  img.onload  = () => res(true);
                  img.onerror = () => res(false);
                  img.src = src;
                });
                if (ok) { imgs.push(src); found = true; break; }
              }
              if (!found) break;
              i++;
            }

            if (imgs.length > 0) {
              screenshotsGrid.innerHTML = imgs.map((src, i) =>
                `<img class="screenshot-img" src="${src}" alt="Screenshot ${i + 1}" onclick="openLightbox(this.src)">`
              ).join('');
            } else {
              document.getElementById('screenshots-section').style.display = 'none';
            }
          }
          loadScreenshots();

          // Videos
          const videosGrid = document.getElementById('videos-grid');
          if (game.videos && game.videos.length > 0) {
            // Support both plain strings and {order, url} objects
            const sorted = game.videos
              .map(v => typeof v === 'string' ? { order: 0, url: v } : v)
              .sort((a, b) => (a.order ?? 0) - (b.order ?? 0));

            videosGrid.innerHTML = sorted.map(v => {
              const url = v.url;
              if (url.endsWith('.mp4') || url.endsWith('.webm')) {
                return `<video controls style="width:100%;aspect-ratio:16/9;border-radius:2px;display:block;background:#000;"><source src="../${url}" type="video/mp4"></video>`;
              }
              let ytId = null;
              if (url.includes('youtube.com/watch')) ytId = new URL(url).searchParams.get('v');
              else if (url.includes('youtu.be/')) ytId = url.split('youtu.be/')[1].split('?')[0];
              if (ytId) {
                const thumb = `https://img.youtube.com/vi/${ytId}/maxresdefault.jpg`;
                const embedUrl = `https://www.youtube.com/embed/${ytId}?autoplay=1&modestbranding=1&rel=0&iv_load_policy=3`;
                return `
                  <div class="yt-facade" onclick="openVideoModal('${embedUrl}')">
                    <img src="${thumb}" alt="Video">
                    <div class="yt-play">
                      <svg viewBox="0 0 68 48"><path d="M66.5 7.7c-.8-2.9-3-5.2-5.9-6C55.8.1 34 0 34 0S12.2.1 7.4 1.7C4.5 2.5 2.3 4.8 1.5 7.7 0 12.5 0 24 0 24s0 11.5 1.5 16.3c.8 2.9 3 5.2 5.9 6C12.2 47.9 34 48 34 48s21.8-.1 26.6-1.7c2.9-.8 5.1-3.1 5.9-6C68 35.5 68 24 68 24s0-11.5-1.5-16.3z" fill="#ff0000"/><path d="M45 24 27 14v20" fill="#fff"/></svg>
                    </div>
                  </div>`;
              }
              let embedUrl = url;
              if (url.includes('streamable.com') && !url.includes('/e/')) embedUrl = url.replace('streamable.com/', 'streamable.com/e/');
              return `<iframe src="${embedUrl}" frameborder="0" allowfullscreen style="width:100%;aspect-ratio:16/9;border-radius:2px;display:block;"></iframe>`;
            }).join('');
          } else {
            document.getElementById('videos-section').style.display = 'none';
          }
        })
        .catch(() => {
          document.getElementById('game-title').textContent = 'Could not load game data';
        });
    }

    // ── DESCRIPTION TOGGLE ──
    function toggleDesc() {
      const desc = document.getElementById('game-description');
      const btn  = document.getElementById('show-more-btn');
      const expanded = desc.classList.toggle('expanded');
      btn.textContent = expanded ? 'Show Less ↑' : 'Show More ↓';
    }

    // ── VIDEO MODAL ──
    function openVideoModal(src) {
      document.getElementById('video-modal-iframe').src = src;
      document.getElementById('video-modal').classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function closeVideoModal() {
      document.getElementById('video-modal-iframe').src = '';
      document.getElementById('video-modal').classList.remove('active');
      document.body.style.overflow = '';
    }

    // ── LIGHTBOX ──
    function openLightbox(src) {
      const lightbox    = document.getElementById('lightbox');
      const lightboxImg = document.getElementById('lightbox-img');
      lightboxImg.src = src;
      lightbox.classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      const lightbox = document.getElementById('lightbox');
      lightbox.classList.remove('active');
      document.body.style.overflow = '';
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') { closeLightbox(); closeVideoModal(); }
    });
  </script>

  <!-- Video Modal -->
  <div class="video-modal" id="video-modal" onclick="closeVideoModal()">
    <div class="video-modal-inner" onclick="event.stopPropagation()">
      <button class="video-modal-close" onclick="closeVideoModal()">✕ Close</button>
      <iframe id="video-modal-iframe" src="" allowfullscreen allow="autoplay"></iframe>
    </div>
  </div>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <img id="lightbox-img" src="" alt="Screenshot" onclick="event.stopPropagation()">
  </div>

</body>
</html>
