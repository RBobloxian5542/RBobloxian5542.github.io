<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game — RBobloxian5542</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:          #0d0d0f;
      --bg2:         #131316;
      --bg3:         #1a1a1e;
      --text:        #f0ead8;
      --text-dim:    #777;
      --tag-lead:    #ff6eb4;
      --tag-contrib: #60a5fa;
      --tag-part:    #a78bfa;
      --roblox-blue: #0066ff;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; min-height: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      overflow-x: hidden;
    }

    /* ── TOP BAR ── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.4rem 5vw;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      background: var(--bg2);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      text-decoration: none;
      color: var(--text-dim);
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: color 0.2s;
    }
    .back-btn:hover { color: var(--text); }

    .topbar-title {
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    /* ── HERO SECTION ── */
    .game-hero {
      display: flex;
      gap: 2rem;
      padding: 3rem 5vw 2.5rem;
      align-items: flex-start;
    }

    /* thumbnail */
    .game-thumb-wrap {
      flex: 0 0 auto;
      width: 45%;
      max-width: 540px;
      border-radius: 4px;
      overflow: hidden;
      background: var(--bg3);
      aspect-ratio: 16/9;
    }

    .game-thumb-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .game-thumb-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.15);
    }

    /* right side info */
    .game-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      padding-top: 0.25rem;
    }

    .game-tag {
      display: inline-block;
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 0.25rem 0.65rem;
      border: 1px solid;
      border-radius: 1px;
      width: fit-content;
    }

    .game-tag.Lead         { color: var(--tag-lead);    border-color: var(--tag-lead);    background: rgba(255,110,180,0.07); }
    .game-tag.Contribution { color: var(--tag-contrib); border-color: var(--tag-contrib); background: rgba(96,165,250,0.07); }
    .game-tag.Part-Time    { color: var(--tag-part);    border-color: var(--tag-part);    background: rgba(167,139,250,0.07); }

    .game-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2rem, 4vw, 3.5rem);
      line-height: 1;
      letter-spacing: 0.02em;
    }

    .game-visits {
      font-size: 0.72rem;
      color: var(--text-dim);
      letter-spacing: 0.08em;
    }

    .game-visits b { color: var(--text); font-weight: 400; }

    /* Roblox play button */
    .play-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      background: var(--roblox-blue);
      color: #fff;
      text-decoration: none;
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.75rem 1.8rem;
      border-radius: 3px;
      width: fit-content;
      transition: background 0.2s, transform 0.15s;
      margin-top: 0.5rem;
    }

    .play-btn:hover {
      background: #0052cc;
      transform: translateY(-1px);
    }

    .play-btn svg {
      width: 14px;
      height: 14px;
      fill: #fff;
      flex-shrink: 0;
    }

    /* ── DIVIDER ── */
    .divider {
      height: 1px;
      background: rgba(255,255,255,0.06);
      margin: 0 5vw;
    }

    /* ── CONTENT SECTIONS ── */
    .content {
      padding: 2.5rem 5vw 5rem;
      display: flex;
      flex-direction: column;
      gap: 3rem;
    }

    .section-label {
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 1.2rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.06);
    }

    /* description */
    .description-text {
      font-size: 0.82rem;
      line-height: 1.9;
      color: var(--text-dim);
      max-width: 680px;
    }

    /* screenshots grid */
    .screenshots-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 0.8rem;
    }

    .screenshot-placeholder {
      aspect-ratio: 16/9;
      background: var(--bg3);
      border: 1px dashed rgba(255,255,255,0.08);
      border-radius: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.15);
    }

    /* screenshot real image */
    .screenshot-img {
      width: 100%;
      aspect-ratio: 16/9;
      object-fit: cover;
      display: block;
      border-radius: 2px;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .screenshot-img:hover { opacity: 0.85; }
    .videos-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 0.8rem;
    }

    .video-placeholder {
      aspect-ratio: 16/9;
      background: var(--bg3);
      border: 1px dashed rgba(255,255,255,0.08);
      border-radius: 2px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.15);
    }

    .video-placeholder svg {
      width: 28px;
      height: 28px;
      fill: rgba(255,255,255,0.1);
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      .game-hero {
        flex-direction: column;
      }
      .game-thumb-wrap {
        width: 100%;
        max-width: 100%;
      }
    }
  </style>
</head>
<body>

  <nav class="topbar">
    <a href="https://rbobloxian5542.github.io/games" class="back-btn">← Games</a>
    <span class="topbar-title" id="topbar-name">Loading...</span>
  </nav>

  <!-- Hero -->
  <div class="game-hero">
    <div class="game-thumb-wrap" id="thumb-wrap">
      <div class="game-thumb-placeholder">Loading...</div>
    </div>
    <div class="game-info">
      <span class="game-tag" id="game-tag">—</span>
      <div class="game-title" id="game-title">Loading...</div>
      <div class="game-visits">Visits: <b id="game-visits">—</b></div>
      <a href="#" id="play-btn" target="_blank" class="play-btn">
        <svg viewBox="0 0 16 16"><path d="M3 2l11 6-11 6V2z"/></svg>
        Play on Roblox
      </a>
    </div>
  </div>

  <div class="divider"></div>

  <!-- Content -->
  <div class="content">

    <!-- Description -->
    <div>
      <div class="section-label">Work Done</div>
      <p class="description-text" id="game-description">No description yet.</p>
    </div>

    <!-- Screenshots -->
    <div id="screenshots-section">
      <div class="section-label">Screenshots</div>
      <div class="screenshots-grid" id="screenshots-grid">
        <div class="screenshot-placeholder">Screenshot 1</div>
        <div class="screenshot-placeholder">Screenshot 2</div>
        <div class="screenshot-placeholder">Screenshot 3</div>
      </div>
    </div>

    <!-- Videos -->
    <div id="videos-section">
      <div class="section-label">Video Showcase</div>
      <div class="videos-grid" id="videos-grid">
        <div class="video-placeholder">
          <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
          Video Coming Soon
        </div>
      </div>
    </div>

  </div>

  <script>
    const tagClass = { 'Lead Developer': 'Lead', 'Part Time': 'Part-Time', 'Contribution': 'Contribution' };

    function formatVisits(n) {
      n = parseInt(n);
      if (isNaN(n)) return '—';
      if (n >= 1000000000) return (n / 1000000000).toFixed(1).replace(/\.0$/, '') + 'B';
      if (n >= 1000000)    return (n / 1000000).toFixed(1).replace(/\.0$/, '')    + 'M';
      if (n >= 1000)       return (n / 1000).toFixed(1).replace(/\.0$/, '')       + 'K';
      return n.toString();
    }

    // Get slug from URL
    const params = new URLSearchParams(window.location.search);
    const slug   = params.get('game');

    if (!slug) {
      document.getElementById('game-title').textContent = 'Game not found';
    } else {
      fetch('../games.json')
        .then(r => r.json())
        .then(games => {
          const game = games.find(g => g.slug === slug);
          if (!game) { document.getElementById('game-title').textContent = 'Game not found'; return; }

          // Topbar
          document.title = game.title + ' — RBobloxian5542';
          document.getElementById('topbar-name').textContent = game.title;

          // Thumbnail
          const wrap = document.getElementById('thumb-wrap');
          wrap.innerHTML = game.thumb
            ? `<img src="${game.thumb}" alt="${game.title}">`
            : `<div class="game-thumb-placeholder">No Thumbnail</div>`;

          // Tag
          const tagEl  = document.getElementById('game-tag');
          const tagCls = tagClass[game.tag] || 'Contribution';
          tagEl.textContent = game.tag;
          tagEl.classList.add(tagCls);

          // Title, visits, link
          document.getElementById('game-title').textContent   = game.title;
          document.getElementById('game-visits').textContent  = formatVisits(game.visits);
          document.getElementById('play-btn').href            = game.link || '#';

          // Description
          if (game.description) {
            document.getElementById('game-description').textContent = game.description;
          }

          // Screenshots
          const screenshotsGrid = document.getElementById('screenshots-grid');
          if (game.screenshots && game.screenshots.length > 0) {
            screenshotsGrid.innerHTML = game.screenshots.map((src, i) =>
              `<img class="screenshot-img" src="../${src}" alt="Screenshot ${i + 1}">`
            ).join('');
          }

          // Videos — placeholder for now, ready for Streamable later
          const videosGrid = document.getElementById('videos-grid');
          if (game.videos && game.videos.length > 0) {
            videosGrid.innerHTML = game.videos.map(url =>
              `<iframe src="${url}" frameborder="0" allowfullscreen style="width:100%;aspect-ratio:16/9;border-radius:2px;"></iframe>`
            ).join('');
          }
        })
        .catch(() => {
          document.getElementById('game-title').textContent = 'Could not load game data';
        });
    }
  </script>

</body>
</html>
