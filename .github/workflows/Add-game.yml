name: Add Game

on:
  workflow_dispatch:
    inputs:
      universeId:
        description: 'Universe ID'
        required: true
      tag:
        description: 'Tag'
        required: true
        default: 'Lead Developer'
        type: choice
        options:
          - Lead Developer
          - Part Time
          - Commission
      description:
        description: 'Description'
        required: false
        default: ''
      imageFolder:
        description: 'Image Folder Name (for screenshots)'
        required: false
        default: ''
      private:
        description: 'Private / In Development?'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  add-game:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Add game to games.json
        run: |
          node -e "
          const fs = require('fs');
          const games = JSON.parse(fs.readFileSync('games.json', 'utf8'));

          const maxOrder = games.reduce((max, g) => Math.max(max, g.order ?? 0), 0);

          const newGame = {
            order: maxOrder + 1,
            universeId: '${{ github.event.inputs.universeId }}',
            tag: '${{ github.event.inputs.tag }}',
            title: '',
            visits: 0,
            thumb: null,
            link: null,
            slug: '',
            imageFolder: '${{ github.event.inputs.imageFolder }}',
            description: '${{ github.event.inputs.description }}',
            videos: [],
            private: ${{ github.event.inputs.private }}
          };

          games.push(newGame);
          fs.writeFileSync('games.json', JSON.stringify(games, null, 2));
          console.log('Game added! Run Update Games Data to fetch title/thumb/visits.');
          "

      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add games.json
          git commit -m "Add new game (universeId: ${{ github.event.inputs.universeId }})"
          git push
